version: '3.8'

services:
  churn-prediction:
    build: .
    container_name: customer-churn-prediction
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./models:/app/models
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_LOGGER_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Docker Compose Usage:
# 
# Build the image:
#   docker-compose build
# 
# Start the application:
#   docker-compose up
# 
# Start in background:
#   docker-compose up -d
# 
# Stop the application:
#   docker-compose down
# 
# View logs:
#   docker-compose logs -f
# 
# Access the app:
#   http://localhost:8501
