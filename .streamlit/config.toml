[theme]
primaryColor = "#3498db"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true

[logger]
level = "info"

[browser]
serverAddress = "localhost"

[server]
port = 8501
maxUploadSize = 200
headless = true
enableXsrfProtection = true
enableCORS = true
